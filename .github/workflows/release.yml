name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: sitegrab-linux-x86_64.tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: sitegrab-linux-aarch64.tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: sitegrab-macos-x86_64.tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: sitegrab-macos-aarch64.tar.gz

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation deps (Linux aarch64)
        if: contains(matrix.target, 'aarch64-unknown-linux')
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu libc6-dev-arm64-cross

      - name: Set linker for aarch64 Linux
        if: contains(matrix.target, 'aarch64-unknown-linux')
        run: |
          mkdir -p .cargo
          cat >> .cargo/config.toml << 'EOF'
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          EOF

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare archive
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/sitegrab dist/
          cd dist
          tar czf ${{ matrix.archive }} sitegrab

      - name: Upload archive
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: dist/${{ matrix.archive }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all archives
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Verify archives
        run: ls -lh sitegrab-*.tar.gz

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: sitegrab-*.tar.gz
          generate_release_notes: true
