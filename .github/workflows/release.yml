name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: sitegrab-linux-x86_64.tar.gz
            binary: sitegrab
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: sitegrab-linux-aarch64.tar.gz
            binary: sitegrab
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: sitegrab-macos-x86_64.tar.gz
            binary: sitegrab
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: sitegrab-macos-aarch64.tar.gz
            binary: sitegrab
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: sitegrab-windows-x86_64.zip
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install aarch64 cross-compiler & linker
        if: contains(matrix.target, 'aarch64-unknown-linux')
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          mkdir -p .cargo
          cat > .cargo/config.toml << 'EOF'
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          EOF

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      - name: Prepare archive
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} dist/
          cd dist
          if [[ "${{ matrix.archive }}" == *.zip ]]; then
            7z a ${{ matrix.archive }} ${{ matrix.binary }}
          else
            tar czf ${{ matrix.archive }} ${{ matrix.binary }}
          fi

      - name: Upload archive
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: dist/${{ matrix.archive }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all archives
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Verify archives
        run: ls -lh sitegrab-*

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: sitegrab-*
          generate_release_notes: true
